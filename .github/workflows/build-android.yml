name: Zbuduj Android APK

on:
  push:
    branches: [main, claude/android-app-setup-files-G9h7Z]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Konfiguracja Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalacja zaleznosci Capacitor
        run: npm install

      - name: Przygotuj pliki web (www/)
        run: bash android-setup.sh

      - name: Konfiguracja Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Konfiguracja Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'
          accept-android-sdk-licenses: true

      - name: Dodaj platforme Android (Capacitor)
        run: npx cap add android

      - name: Synchronizacja plikow web z projektem Android
        run: npx cap sync android

      - name: Nadaj uprawnienia Gradle
        run: chmod +x android/gradlew

      - name: Zbuduj APK debug
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2048m"

      - name: Zmien nazwe APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/debug/app-debug.apk dist/ElewacjaPro.apk

      - name: Zapisz APK jako artefakt do pobrania
        uses: actions/upload-artifact@v4
        with:
          name: ElewacjaPro-Android
          path: dist/ElewacjaPro.apk
          retention-days: 30
